<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <div class="card">
        <div class="card-header d-flex">
            <h3>Payment Form Example</h3>
        </div>
        <div class="card-body">
            <div class="alert alert-danger d-flex fs-4 m-1 py-1" role="alert">
                Some fields are missing
            </div>
            <div class="row m-5 d-flex">
                <div class="col-md-6 d-flex flex-column justify-content-start">
                    <label for="card-number">Card #</label>
                    <input type="text" id="card-number" placeholder="XXXXXXXXXXXXXXXX" class="mt-3 form-control">
                </div>
                <div class="col-md-3 d-flex flex-column justify-content-start">
                    <label for="cvc">CVC #</label>
                    <input type="text" id="cvc" placeholder="0000" class="mt-3 form-control">
                </div>
                <div class="col-md-3 d-flex flex-column justify-content-start">
                    <label for="amount">Amount</label>
                    <div class="d-flex mt-2 align-items-center">
                        <p class="fw-bold">$</p><input type="text" id="amount" placeholder="Amount"
                            class="text-start form-control mt-2">
                    </div>
                </div>

            </div>
            <div class="card-footer text-muted">
                2 days ago
            </div>
        </div>







        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
</body>

</html>
