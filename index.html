<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body class="min-vh-100">
    <div class="card">
        <div class="card-header d-flex">
            <h3>Payment Form Example</h3>
        </div>
        <div class="card-body">
            <div class="alert alert-danger d-flex fs-4 m-1 py-1 mb-4" role="alert">
                Some fields are missing
            </div>
            <!--Card Info-->
            <div class="row">
                <div class="col-md-5 d-flex flex-column">
                    <label for="card-number">Card #</label>
                    <input type="text" id="card-number" placeholder="XXXXXXXXXXXXXXXX" class="mt-3 form-control">
                </div>
                <div class="col-md-3 d-flex flex-column">
                    <label for="cvc">CVC #</label>
                    <input type="text" id="cvc" placeholder="0000" class="mt-3 form-control">
                </div>
                <div class="col-md-4 d-flex flex-column">
                    <label for="amount">Amount</label>
                    <div class="d-flex mt-2 align-items-center">
                        <p class="fw-bold">$</p><input type="text" id="amount" placeholder="Amount"
                            class="text-start form-control mt-2">
                    </div>
                </div>

            </div>
            <!--Card Info END-->

            <!--Name-->
            <div class="row mt-4">
                <div class="col-md-6">
                    <label for="name">First Name</label>
                    <input type="text" id="name" class="form-control mt-3">
                </div>
                <div class="col-md-6">
                    <label for="surname">Last Name</label>
                    <input type="text" id="surname" class="form-control mt-3">
                </div>
            </div>
            <!--Name END-->
            <div class="row mt-4">
                <div class="col-md-6">
                    <label for="city">City</label>
                    <input type="text" id="city" class="form-control mt-3">
                </div>
                <div class="col-md-3">
                    <label for="state">State</label>
                    <select id="state" class="form-control mt-3">
                        <option value="" selected disabled>Pick a state</option>
                        <option value="AL">Alabama</option>
                        <option value="AK">Alaska</option>
                        <option value="AZ">Arizona</option>
                        <option value="AR">Arkansas</option>
                        <option value="CA">California</option>
                        <option value="CO">Colorado</option>
                        <option value="CT">Connecticut</option>
                        <option value="DE">Delaware</option>
                        <option value="FL">Florida</option>
                        <option value="GA">Georgia</option>
                        <option value="HI">Hawaii</option>
                        <option value="ID">Idaho</option>
                        <option value="IL">Illinois</option>
                        <option value="IN">Indiana</option>
                        <option value="IA">Iowa</option>
                        <option value="KS">Kansas</option>
                        <option value="KY">Kentucky</option>
                        <option value="LA">Louisiana</option>
                        <option value="ME">Maine</option>
                        <option value="MD">Maryland</option>
                        <option value="MA">Massachusetts</option>
                        <option value="MI">Michigan</option>
                        <option value="MN">Minnesota</option>
                        <option value="MS">Mississippi</option>
                        <option value="MO">Missouri</option>
                        <option value="MT">Montana</option>
                        <option value="NE">Nebraska</option>
                        <option value="NV">Nevada</option>
                        <option value="NH">New Hampshire</option>
                        <option value="NJ">New Jersey</option>
                        <option value="NM">New Mexico</option>
                        <option value="NY">New York</option>
                        <option value="NC">North Carolina</option>
                        <option value="ND">North Dakota</option>
                        <option value="OH">Ohio</option>
                        <option value="OK">Oklahoma</option>
                        <option value="OR">Oregon</option>
                        <option value="PA">Pennsylvania</option>
                        <option value="RI">Rhode Island</option>
                        <option value="SC">South Carolina</option>
                        <option value="SD">South Dakota</option>
                        <option value="TN">Tennessee</option>
                        <option value="TX">Texas</option>
                        <option value="UT">Utah</option>
                        <option value="VT">Vermont</option>
                        <option value="VA">Virginia</option>
                        <option value="WA">Washington</option>
                        <option value="WV">West Virginia</option>
                        <option value="WI">Wisconsin</option>
                        <option value="WY">Wyoming</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="postal-code">Postal Code</label>
                    <input type="text" id="postal-code" class="form-control mt-3">
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-md-3">
                    <p>We accept:</p>
                    <div class="cards-container d-inline-flex align-items-center rounded gap-0 bg-secondary">
                        <div class="visa bg-secondary form-check p-1">
                            <input type="radio" id="visa">
                            <label for="visa"><i class="fa-brands fa-cc-visa text-white"></i></label>
                        </div>
                        <div class="mastercard bg-secondary form-check p-1">
                            <input type="radio" id="mastercard">
                            <label for="mastercard"><i class="fa-brands fa-cc-mastercard text-white"></i></label>
                        </div>
                        <div class="amex bg-secondary form-check p-1">
                            <input type="radio" id="amex">
                            <label for="amex"><i class="fa-brands fa-cc-amex text-white"></i></label>
                        </div>
                        <div class="dinners bg-secondary form-check p-1">
                            <input type="radio" id="dinners">
                            <label for="dinners"><i class="fa-brands fa-cc-diners-club text-white"></i></label>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 ms-auto">
                    <div class="textarea-container">
                        <label for="message">Message:</label>
                        <textarea class="form-control mt-3" id="message" rows="3"></textarea>
                        <span class="text-secondary">Add any notes here.</span>
                    </div>
                </div>
            </div>
            <div class="card-footer d-flex justify-content-end mt-4">
                <div class="btn-container">
                    <button class="btn btn-secondary px-3">Cancel</button>
                    <button class="btn btn-primary px-3">Send</button>
                </div>
            </div>
        </div>







        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
        <script src="https://kit.fontawesome.com/d80be40a3f.js" crossorigin="anonymous"></script>
</body>

</html>
